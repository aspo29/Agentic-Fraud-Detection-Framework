version: '3.8'

services:
  # FastAPI Application
  api:
    build: .
    container_name: fraud-detection-api
    ports:
      - "8002:8000"
    environment:
      - DEBUG=False
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - API_KEY=test-api-key-12345
    depends_on:
      - kafka
      - redis
      - mlflow
    networks:
      - fraud-detection
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraud-detection-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CONFLUENT_SUPPORT_CUSTOMER_ID: "anonymous"
    depends_on:
      - zookeeper
    networks:
      - fraud-detection

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fraud-detection-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud-detection

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fraud-detection-redis
    ports:
      - "6379:6379"
    networks:
      - fraud-detection
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: fraud-detection-mlflow
    ports:
      - "5001:5001"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /tmp/mlflow/artifacts
    depends_on:
      - postgres
    volumes:
      - mlflow-artifacts:/tmp/mlflow/artifacts
    networks:
      - fraud-detection
    command: mlflow server --host 0.0.0.0 --port 5001

  # PostgreSQL (MLflow backend)
  postgres:
    image: postgres:15-alpine
    container_name: fraud-detection-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fraud-detection
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Database
  neo4j:
    image: neo4j:5.14.0
    container_name: fraud-detection-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    networks:
      - fraud-detection
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fraud-detection:
    driver: bridge

volumes:
  mlflow-artifacts:
  postgres-data:
  neo4j-data:
